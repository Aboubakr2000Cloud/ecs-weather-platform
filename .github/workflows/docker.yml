name: Production CI/CD (Terraform + ECS + ECR)

on:
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'Dockerfile'
      
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging    

env:
  AWS_REGION: eu-west-1
  TF_DIR: ./terraform
  ECR_REPOSITORY: weather-app
  ECS_CLUSTER: ecs-weather-platform-dev-cluster
  ECS_SERVICE: weather-app
  CONTAINER_NAME: weather-app

jobs:

# -------------------------
# 1. TERRAFORM (INFRA SAFE APPLY)
# -------------------------
  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Show selected environment
        run: echo "Environment = ${{ github.event.inputs.environment }}"  

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend-config=backends/dev.hcl

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_weather_api_key: ${{ secrets.WEATHER_API_KEY }}
        run: terraform plan -var-file=envs/dev.tfvars


  integration-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0

        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: weatherdb
          MYSQL_USER: weatheruser
          MYSQL_PASSWORD: weatherpass

        ports:
          - 3306:3306

        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt
      
      - run: pip install pytest
      
      - name: Initialize database
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client

          mysql \
            -h 127.0.0.1 \
            -u weatheruser \
            -pweatherpass \
            weatherdb \
            < migrations/001_init.sql
      
      - name: Run integration tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: weatheruser
          DB_PASSWORD: weatherpass
          DB_NAME: weatherdb
          WEATHER_API_KEY: dummy

        run: python -m pytest tests/integration -v

# -------------------------
# 2. BUILD & PUSH IMAGE
# -------------------------
  build:
    if: false
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: terraform

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, push
        id: image
        run: |
          IMAGE_URI=${{ steps.login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI

          docker tag $IMAGE_URI ${{ steps.login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ steps.login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT


# -------------------------
# 3. DEPLOY (FORCE ECS REFRESH)
# -------------------------
  deploy:
    if: false
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force ECS new deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment
