name: Production CI/CD (Terraform + ECS + ECR)

on:
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'Dockerfile'
      
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging    

env:
  AWS_REGION: eu-west-1
  TF_DIR: ./terraform
  ECR_REPOSITORY: weather-app
  ECS_CLUSTER: ecs-weather-platform-dev-cluster
  ECS_SERVICE: weather-app
  CONTAINER_NAME: weather-app

jobs:

# -------------------------
# 1. TERRAFORM (INFRA SAFE APPLY)
# -------------------------
  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Show selected environment
        run: echo "Environment = ${{ github.event.inputs.environment }}"  

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend-config=backends/dev.hcl

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_weather_api_key: ${{ secrets.WEATHER_API_KEY }}
        run: terraform plan -var-file=envs/dev.tfvars


  deploy-prod:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Waiting for approval
        run: echo "Production deployment approved!"

# -------------------------
# 2. BUILD & PUSH IMAGE
# -------------------------
  build:
    if: false
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: terraform

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, push
        id: image
        run: |
          IMAGE_URI=${{ steps.login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI

          docker tag $IMAGE_URI ${{ steps.login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ steps.login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT


# -------------------------
# 3. DEPLOY (FORCE ECS REFRESH)
# -------------------------
  deploy:
    if: false
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force ECS new deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment
